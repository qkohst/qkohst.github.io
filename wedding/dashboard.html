<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Undangan Pernikahan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --sage        : #556B4A;
      --sage-light  : #8B9E7E;
      --gold        : #C8A97E;
      --gold-light  : #E8D5B5;
      --bg          : #F4F6F3;
      --card        : #FFFFFF;
      --border      : #E3E8DF;
      --text        : #1F2A1A;
      --text-mid    : #6B7A65;
      --text-dim    : #A0ADA0;
      --wa-1        : #22C35E;
      --wa-1-h      : #1AA851;
      --wa-2        : #128C7E;
      --wa-2-h      : #0C6B60;
      --radius      : 10px;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html  { font-size: 15px; scroll-behavior: smooth; }
    body  {
      font-family : 'Inter', sans-serif;
      background  : var(--bg);
      color       : var(--text);
      min-height  : 100vh;
    }

    /* ── HEADER ── */
    .dash-header {
      background     : linear-gradient(135deg, #1E2A18 0%, #2F4227 50%, var(--sage) 100%);
      color          : #fff;
      padding        : 1.1rem 1.5rem;
      position       : sticky;
      top            : 0;
      z-index        : 100;
      box-shadow     : 0 2px 16px rgba(0,0,0,.22);
      display        : flex;
      align-items    : center;
      justify-content: space-between;
      gap            : .75rem;
    }
    .dash-brand {
      display    : flex;
      align-items: center;
      gap        : .6rem;
      text-decoration: none;
      color      : #fff;
    }
    .dash-brand-icon {
      width          : 36px;
      height         : 36px;
      background     : rgba(255,255,255,.1);
      border         : 1px solid rgba(200,169,126,.4);
      border-radius  : 8px;
      display        : flex;
      align-items    : center;
      justify-content: center;
      font-size      : 1.1rem;
      color          : var(--gold);
      flex-shrink    : 0;
    }
    .dash-brand-text {
      font-size  : .92rem;
      font-weight: 600;
      line-height : 1.3;
    }
    .dash-brand-sub {
      font-size  : .68rem;
      font-weight: 400;
      color      : var(--gold-light);
      opacity    : .85;
    }
    .dash-date-badge {
      font-size   : .65rem;
      font-weight : 500;
      letter-spacing: .05em;
      color       : rgba(255,255,255,.6);
      display     : flex;
      align-items : center;
      gap         : .35rem;
      white-space : nowrap;
    }

    /* ── PAGE BODY ── */
    .dash-body {
      max-width : 1000px;
      margin    : 0 auto;
      padding   : 1.5rem 1rem 3rem;
    }

    /* ── STATS ROW ── */
    .stats-grid {
      display              : grid;
      grid-template-columns: repeat(4, 1fr);
      gap                  : .75rem;
      margin-bottom        : 1.5rem;
    }
    .stat-card {
      background   : var(--card);
      border       : 1px solid var(--border);
      border-radius: var(--radius);
      padding      : 1rem 1.1rem;
    }
    .stat-num {
      font-size  : 1.8rem;
      font-weight: 700;
      color      : var(--sage);
      line-height: 1;
    }
    .stat-num.gold { color: var(--gold); }
    .stat-label {
      font-size     : .6rem;
      font-weight   : 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color         : var(--text-mid);
      margin-top    : .3rem;
    }

    /* ── TABLE CARD ── */
    .table-card {
      background   : var(--card);
      border       : 1px solid var(--border);
      border-radius: var(--radius);
      overflow     : hidden;
    }
    .table-card-top {
      padding        : .9rem 1.2rem;
      border-bottom  : 1px solid var(--border);
      display        : flex;
      align-items    : center;
      justify-content: space-between;
      flex-wrap      : wrap;
      gap            : .75rem;
      background     : #FAFCF9;
    }
    .table-card-title {
      font-size  : .85rem;
      font-weight: 600;
      color      : var(--text);
      display    : flex;
      align-items: center;
      gap        : .5rem;
    }
    .table-card-title i { color: var(--sage); }

    /* ── SEARCH ── */
    .search-wrap {
      position : relative;
    }
    .search-wrap > i {
      position : absolute;
      left     : .7rem;
      top      : 50%;
      transform: translateY(-50%);
      color    : var(--text-dim);
      font-size: .82rem;
      pointer-events: none;
    }
    .search-input {
      border        : 1px solid var(--border);
      border-radius : 7px;
      padding       : .48rem .9rem .48rem 2.1rem;
      font-family   : 'Inter', sans-serif;
      font-size     : .78rem;
      color         : var(--text);
      outline       : none;
      width         : 230px;
      background    : var(--card);
      transition    : border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus {
      border-color: var(--sage-light);
      box-shadow  : 0 0 0 3px rgba(139,158,126,.15);
    }

    /* ── GUEST TABLE ── */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .guest-table {
      width           : 100%;
      border-collapse : collapse;
      font-size       : .81rem;
      min-width       : 560px;
    }
    .guest-table thead th {
      background    : #F6F8F5;
      padding       : .65rem 1rem;
      text-align    : left;
      font-size     : .6rem;
      font-weight   : 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color         : var(--text-mid);
      border-bottom : 1px solid var(--border);
      white-space   : nowrap;
    }
    .guest-table tbody td {
      padding        : .9rem 1rem;
      border-bottom  : 1px solid #F0F4EE;
      vertical-align : top;
    }
    .guest-table tbody tr:last-child td  { border-bottom: none; }
    .guest-table tbody tr:hover          { background: #FAFCF9; }

    /* ── CELL CONTENT ── */
    .row-num {
      color      : var(--text-dim);
      font-size  : .72rem;
      font-weight: 500;
      padding-top: .2rem;
    }
    .guest-name {
      font-weight: 600;
      color      : var(--text);
      display    : block;
      line-height: 1.4;
    }
    .guest-key-badge {
      display        : inline-flex;
      align-items    : center;
      gap            : .2rem;
      font-size      : .62rem;
      color          : var(--sage);
      background     : #EEF3EB;
      padding        : .12rem .5rem;
      border-radius  : 4px;
      margin-top     : .3rem;
      font-family    : 'Courier New', monospace;
      letter-spacing : .03em;
    }
    .guest-addr {
      color      : var(--text-mid);
      line-height: 1.55;
      font-size  : .78rem;
    }
    .no-addr {
      color     : var(--text-dim);
      font-size : .72rem;
      font-style: italic;
    }

    /* ── WA BUTTONS ── */
    .btns-wa {
      display       : flex;
      flex-direction: column;
      gap           : .4rem;
    }
    .btn-wa {
      display        : inline-flex;
      align-items    : center;
      justify-content: center;
      gap            : .4rem;
      padding        : .45rem .9rem;
      border-radius  : 6px;
      font-size      : .7rem;
      font-weight    : 600;
      text-decoration: none;
      white-space    : nowrap;
      border         : none;
      cursor         : pointer;
      transition     : background .2s, transform .15s;
    }
    .btn-wa:active { transform: scale(.97); }
    .btn-wa-1 { background: var(--wa-1);  color: #fff; }
    .btn-wa-1:hover { background: var(--wa-1-h); color: #fff; }
    .btn-wa-2 { background: var(--wa-2);  color: #fff; }
    .btn-wa-2:hover { background: var(--wa-2-h); color: #fff; }
    .btn-wa i { font-size: .85rem; }

    /* ── EMPTY / NOT FOUND ── */
    .empty-row td {
      padding   : 3rem 1rem !important;
      text-align: center;
      color     : var(--text-mid);
    }
    .empty-row i { font-size: 2.5rem; opacity: .25; display: block; margin-bottom: .6rem; }

    /* ── FOOTER ── */
    .dash-footer {
      text-align: center;
      font-size : .62rem;
      color     : var(--text-dim);
      margin-top: 2rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 767px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .dash-date-badge { display: none; }
    }
    @media (max-width: 479px) {
      html { font-size: 14px; }
      .dash-body { padding: 1rem .75rem 2.5rem; }
      .search-input { width: 160px; }
      .table-card-top { gap: .5rem; }
      .guest-table { min-width: 480px; }
      /* hide # column on very small screens */
      .guest-table thead th:first-child,
      .guest-table tbody td:first-child { display: none; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="dash-header">
  <div class="dash-brand">
    <div class="dash-brand-icon"><i class="bi bi-envelope-heart-fill"></i></div>
    <div>
      <div class="dash-brand-text">Admin Dashboard</div>
      <div class="dash-brand-sub" id="dash-couple-name">Undangan Pernikahan</div>
    </div>
  </div>
  <div class="dash-date-badge">
    <i class="bi bi-calendar3"></i>
    <span id="dash-wedding-date">—</span>
  </div>
</header>

<!-- ── MAIN ── -->
<div class="dash-body">

  <!-- Stats -->
  <div class="stats-grid" id="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total Tamu</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-with-addr">—</div>
      <div class="stat-label">Ada Alamat</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-no-addr">—</div>
      <div class="stat-label">Tanpa Alamat</div>
    </div>
    <div class="stat-card">
      <div class="stat-num gold" id="stat-countdown">—</div>
      <div class="stat-label">Hari Menuju Nikah</div>
    </div>
  </div>

  <!-- Guest Table -->
  <div class="table-card">
    <div class="table-card-top">
      <span class="table-card-title">
        <i class="bi bi-people-fill"></i>
        Daftar Tamu Undangan
      </span>
      <div class="search-wrap">
        <i class="bi bi-search"></i>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Cari nama / alamat…"
          oninput="filterTable()"
          autocomplete="off"
        />
      </div>
    </div>

    <div class="table-scroll">
      <table class="guest-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Nama Tamu</th>
            <th>Alamat</th>
            <th>Kirim Undangan via WhatsApp</th>
          </tr>
        </thead>
        <tbody id="guest-tbody">
          <!-- populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <div class="dash-footer">
    Dashboard ini bersifat privat — tidak untuk dibagikan ke tamu &nbsp;·&nbsp;
    <a href="index.html" style="color:var(--sage-light)">Lihat Undangan Tema 1</a> &nbsp;·&nbsp;
    <a href="index-2.html" style="color:var(--sage-light)">Lihat Undangan Tema 2</a>
  </div>

</div>

<!-- ── SCRIPTS ── -->
<script src="assets/js/wedding-data.js"></script>
<script>
/* ════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════ */
function esc(t) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(t)));
  return d.innerHTML;
}

/* Detect the folder base URL so links work on localhost and GitHub Pages alike */
function getBaseUrl() {
  const href = window.location.href;
  return href.substring(0, href.lastIndexOf('/') + 1);
}

function inviteUrl(key, theme) {
  return getBaseUrl() + (theme === 1 ? 'index.html' : 'index-2.html') + '?to=' + encodeURIComponent(key);
}

/* ════════════════════════════════════════════════════════
   WA MESSAGE BUILDER
════════════════════════════════════════════════════════ */
function buildWaMessage(guestName, link, theme) {
  const wd = weddingData;
  const themeTag = theme === 1
    ? '🌿 _Undangan Tema Ivory & Sage_'
    : '🌹 _Undangan Tema Dark & Gold_';

  return (
`Assalamu'alaikum Wr. Wb.

Kepada Yth.
*${guestName}*

Dengan penuh kebahagiaan dan kerendahan hati, kami mengundang Bapak/Ibu/Saudara/i untuk hadir memberikan doa restu pada pernikahan kami:

💍 *${wd.groom.fullName}*
   _Putra dari ${wd.groom.parents.father} & ${wd.groom.parents.mother}_

💐 *${wd.bride.fullName}*
   _Putri dari ${wd.bride.parents.father} & ${wd.bride.parents.mother}_

📅 *${wd.wedding.dateFormatted}*
   ${wd.wedding.hijriyah}

🕐 *Akad Nikah* — ${wd.events.akad.time}
   📍 ${wd.events.akad.venue}

🍽️ *Resepsi Pernikahan* — ${wd.events.resepsi.time}
   📍 ${wd.events.resepsi.venue}

${themeTag}
👉 *${link}*

Merupakan suatu kehormatan apabila Bapak/Ibu/Saudara/i berkenan hadir. Semoga Allah SWT memudahkan langkah dan melimpahkan keberkahan untuk kita semua.

Wassalamu'alaikum Wr. Wb.
_${wd.groom.nickname} & ${wd.bride.nickname}_ ${wd.wedding.hashtag}`
  );
}

/* ════════════════════════════════════════════════════════
   RENDER TABLE
════════════════════════════════════════════════════════ */
function renderTable(filter) {
  const wd     = weddingData;
  const tbody  = document.getElementById('guest-tbody');
  const q      = (filter || '').trim().toLowerCase();

  const entries = Object.entries(wd.guests).filter(([k]) => k !== 'default');

  let total    = 0;
  let withAddr = 0;
  let noAddr   = 0;
  let visIdx   = 0;

  tbody.innerHTML = '';

  entries.forEach(([key, g]) => {
    total++;
    if (g.address) withAddr++; else noAddr++;

    /* search filter */
    if (q) {
      const haystack = [g.name, g.address || '', key].join(' ').toLowerCase();
      if (!haystack.includes(q)) return;
    }

    visIdx++;

    const url1 = inviteUrl(key, 1);
    const url2 = inviteUrl(key, 2);
    const wa1  = 'https://wa.me/?text=' + encodeURIComponent(buildWaMessage(g.name, url1, 1));
    const wa2  = 'https://wa.me/?text=' + encodeURIComponent(buildWaMessage(g.name, url2, 2));

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="row-num">${visIdx}</span></td>
      <td>
        <span class="guest-name">${esc(g.name)}</span>
        <span class="guest-key-badge"><i class="bi bi-link-45deg"></i>?to=${esc(key)}</span>
      </td>
      <td>
        ${g.address
          ? `<span class="guest-addr">${esc(g.address)}</span>`
          : `<span class="no-addr">— tidak ada alamat —</span>`}
      </td>
      <td>
        <div class="btns-wa">
          <a href="${esc(wa1)}" target="_blank" rel="noopener noreferrer" class="btn-wa btn-wa-1">
            <i class="bi bi-whatsapp"></i> Tema 1 – Ivory &amp; Sage
          </a>
          <a href="${esc(wa2)}" target="_blank" rel="noopener noreferrer" class="btn-wa btn-wa-2">
            <i class="bi bi-whatsapp"></i> Tema 2 – Dark &amp; Gold
          </a>
        </div>
      </td>`;

    tbody.appendChild(tr);
  });

  /* Empty state */
  if (visIdx === 0) {
    const empty = document.createElement('tr');
    empty.className = 'empty-row';
    empty.innerHTML = `
      <td colspan="4">
        <i class="bi bi-person-x"></i>
        ${q
          ? `Tidak ada tamu yang cocok dengan "<strong>${esc(filter)}</strong>"`
          : 'Belum ada tamu terdaftar.'}
      </td>`;
    tbody.appendChild(empty);
  }

  /* Update stats only on full render (not filtered) */
  if (!q) {
    document.getElementById('stat-total').textContent    = total;
    document.getElementById('stat-with-addr').textContent = withAddr;
    document.getElementById('stat-no-addr').textContent   = noAddr;
  }
}

function filterTable() {
  renderTable(document.getElementById('search-input').value);
}

/* ════════════════════════════════════════════════════════
   COUNTDOWN TO WEDDING
════════════════════════════════════════════════════════ */
function updateCountdown() {
  const diff = new Date(weddingData.wedding.date) - new Date();
  const days = diff > 0 ? Math.ceil(diff / 86400000) : 0;
  document.getElementById('stat-countdown').textContent = days > 0 ? days : '🎉';
}

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const wd = weddingData;

  /* Header info */
  document.getElementById('dash-couple-name').textContent =
    wd.groom.nickname + ' & ' + wd.bride.nickname;
  document.getElementById('dash-wedding-date').textContent = wd.wedding.dateFormatted;

  renderTable();
  updateCountdown();
  setInterval(updateCountdown, 60000);
});
</script>

</body>
</html>
