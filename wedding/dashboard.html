<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#009B77" />
  <meta name="description" content="Dashboard Tamu — Pernikahan Kukoh & Zian" />
  <meta property="og:title" content="Dashboard Tamu — Kukoh &amp; Zian" />
  <meta property="og:description" content="Pernikahan Kukoh &amp; Zian · 7 Juni 2026" />
  <meta property="og:image" content="https://qkohst.github.io/wedding/assets/images/og-thumb.png" />
  <meta property="og:image:width" content="300" />
  <meta property="og:image:height" content="300" />
  <meta property="og:url" content="https://qkohst.github.io/wedding/dashboard.html" />
  <meta property="og:type" content="website" />
  <title>Dashboard Tamu — Kukoh &amp; Zian</title>
  <!-- Favicons -->
  <link href="../school/assets/img/logo.png" rel="icon">
  <link href="../school/assets/img/logo.png" rel="apple-touch-icon">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Dashboard Stylesheet -->
  <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body>

  <!-- ══ APP (phone frame) ═════════════════════════════════ -->
  <div id="app">

    <!-- ══ FLOATING PETALS ═══════════════════════════════════ -->
    <div class="petals-wrap" aria-hidden="true" id="petals-wrap"></div>

    <!-- ════ HEADER ═══════════════════════════════════════ -->
    <header class="dash-header">
      <p class="dash-header-label">Wedding Dashboard</p>
      <h1 class="dash-header-title">Daftar Tamu</h1>
      <p class="dash-header-sub">Kukoh &amp; Zian — 7 Juni 2026</p>
    </header>

    <!-- ════ CONTENT ══════════════════════════════════════ -->
    <main class="dash-content">

      <!-- Stats -->
      <div class="stats-grid" aria-label="Ringkasan tamu">
        <div class="stat-card">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">Total Tamu</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-groom">0</span>
          <span class="stat-label">Pihak Pria</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-bride">0</span>
          <span class="stat-label">Pihak Wanita</span>
        </div>
      </div>

      <!-- Sticky Tabs Container -->
      <div class="sticky-tabs">
        <div class="tab-bar" role="tablist" aria-label="Pilih daftar tamu">
          <button class="tab-btn active" data-tab="groom" role="tab" aria-selected="true" aria-controls="tab-groom">
            <i class="bi bi-person-fill" aria-hidden="true"></i> Mempelai Pria
          </button>
          <button class="tab-btn" data-tab="bride" role="tab" aria-selected="false" aria-controls="tab-bride">
            <i class="bi bi-person-fill" aria-hidden="true"></i> Mempelai Wanita
          </button>
        </div>
      </div>

      <!-- ── GROOM GUEST TABLE ───────────────────────────── -->
      <div class="table-wrap active" data-tab="groom" id="tab-groom" role="tabpanel" aria-label="Tamu mempelai pria">
        <!-- Sticky Search & Filter -->
        <div class="sticky-search-filter">
          <div class="search-filter-wrap">
            <div class="search-wrap">
              <i class="bi bi-search search-icon" aria-hidden="true"></i>
              <input type="search"
                id="search-groom"
                placeholder="Cari nama atau alamat…"
                aria-label="Cari tamu mempelai pria" />
            </div>
            <div class="filter-wrap">
              <button class="filter-btn" id="filter-btn-groom" aria-label="Filter metode undangan">
                <i class="bi bi-funnel" aria-hidden="true"></i>
                <span class="filter-badge" id="filter-badge-groom" style="display: none;">●</span>
              </button>
              <div class="filter-dropdown" id="filter-dropdown-groom" style="display: none;">
                <p class="filter-label">Metode</p>
                <label class="filter-option">
                  <input type="checkbox" value="online" class="filter-checkbox" data-tab="groom" />
                  <span>Online</span>
                </label>
                <label class="filter-option">
                  <input type="checkbox" value="offline" class="filter-checkbox" data-tab="groom" />
                  <span>Offline</span>
                </label>
              </div>
            </div>
          </div>
        </div>
        <div class="table-responsive">
          <div class="table-wrapper">
            <table aria-label="Daftar tamu mempelai pria">
              <thead>
                <tr>
                  <th scope="col">#</th>
                  <th scope="col">Nama</th>
                  <th scope="col">Metode</th>
                  <th scope="col">Aksi</th>
                </tr>
              </thead>
              <tbody id="groom-tbody">
                <!-- Rendered by dashboard.js -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ── BRIDE GUEST TABLE ───────────────────────────── -->
      <div class="table-wrap" data-tab="bride" id="tab-bride" role="tabpanel" aria-label="Tamu mempelai wanita">
        <!-- Sticky Search & Filter -->
        <div class="sticky-search-filter">
          <div class="search-filter-wrap">
            <div class="search-wrap">
              <i class="bi bi-search search-icon" aria-hidden="true"></i>
              <input type="search"
                id="search-bride"
                placeholder="Cari nama atau alamat…"
                aria-label="Cari tamu mempelai wanita" />
            </div>
            <div class="filter-wrap">
              <button class="filter-btn" id="filter-btn-bride" aria-label="Filter metode undangan">
                <i class="bi bi-funnel" aria-hidden="true"></i>
                <span class="filter-badge" id="filter-badge-bride" style="display: none;">●</span>
              </button>
              <div class="filter-dropdown" id="filter-dropdown-bride" style="display: none;">
                <p class="filter-label">Metode</p>
                <label class="filter-option">
                  <input type="checkbox" value="online" class="filter-checkbox" data-tab="bride" />
                  <span>Online</span>
                </label>
                <label class="filter-option">
                  <input type="checkbox" value="offline" class="filter-checkbox" data-tab="bride" />
                  <span>Offline</span>
                </label>
              </div>
            </div>
          </div>
        </div>
        <div class="table-responsive">
          <div class="table-wrapper">
            <table aria-label="Daftar tamu mempelai wanita">
              <thead>
                <tr>
                  <th scope="col">#</th>
                  <th scope="col">Nama</th>
                  <th scope="col">Metode</th>
                  <th scope="col">Aksi</th>
                </tr>
              </thead>
              <tbody id="bride-tbody">
                <!-- Rendered by dashboard.js -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div><!-- /#app -->

  <!-- Data & Scripts -->
  <script src="assets/js/wedding-data.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
